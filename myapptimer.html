<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timer Bars</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 50px;
    }

    .container {
        width: 300px;
        margin: auto;
    }

    .bar {
        width: 100%;
        height: 30px;
        background-color: #ddd;
        margin: 20px 0;
        border-radius: 5px;
        overflow: hidden;
    }

    .fill {
        height: 100%;
        width: 0%;
        background-color: #4CAF50;
        transition: width 0.1s linear;
    }

    .down {
        background-color: #f44336;
        width: 100%;
    }

    button {
        padding: 10px 20px;
        margin: 5px;
        cursor: pointer;
    }
</style>
</head>
<body style="margin-bottom:60px;">

<h2>Timer Bars</h2>

<div class="container">
    <!-- Count Up -->
    <div class="bar">
        <div id="upBar" class="fill"></div>
    </div>
    <button onclick="startCountUp()">Start Count Up</button>

    <!-- Count Down -->
    <div class="bar">
        <div id="downBar" class="fill down"></div>
    </div>
    <button onclick="startCountDown()">Start Count Down</button>
</div>

<script>
let upInterval;
let downInterval;

function startCountUp() {
    clearInterval(upInterval);
    let width = 0;
    const bar = document.getElementById("upBar");

    upInterval = setInterval(() => {
        if (width >= 100) {
            clearInterval(upInterval);
        } else {
            width++;
            bar.style.width = width + "%";
        }
    }, 100); // speed
}

function startCountDown() {
    clearInterval(downInterval);
    let width = 100;
    const bar = document.getElementById("downBar");

    downInterval = setInterval(() => {
        if (width <= 0) {
            clearInterval(downInterval);
        } else {
            width--;
            bar.style.width = width + "%";
        }
    }, 100); // speed
}
</script>

</body>
</html>
